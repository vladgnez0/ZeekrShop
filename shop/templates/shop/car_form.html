{% extends 'shop/base.html' %}
{% block title %}{{ title }} — ZeekrParts{% endblock %}
{% block content %}
<section class="container mx-auto px-4 py-10">
  <div class="max-w-xl mx-auto bg-white border rounded-3xl p-7 md:p-9">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold">{{ title }}</h1>
        <p class="mt-1 text-sm text-slate-600">Выберите модель и заполните данные</p>
      </div>
      <a href="{% url 'shop:profile' %}" class="text-sm text-blue-700 hover:underline">Назад</a>
    </div>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}

      <div>
        <label class="text-sm font-medium">Модель</label>
        {{ form.car_model }}
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">Год</label>
          {{ form.year }}
        </div>
        <div>
          <label class="text-sm font-medium">VIN</label>
          {{ form.vin }}
        </div>
      </div>

      <div>
        <label class="text-sm font-medium">Комментарий</label>
        {{ form.notes }}
      </div>

      <label class="flex items-center gap-2 text-sm text-slate-700">
        {{ form.is_primary }} Сделать основным автомобилем
      </label>

      <button class="w-full px-5 py-3 rounded-xl bg-blue-700 text-white hover:bg-blue-800 font-medium">
        Сохранить
      </button>
    </form>
  </div>
</section>
{% endblock %}
