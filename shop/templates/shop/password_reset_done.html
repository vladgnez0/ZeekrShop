{% extends 'shop/base.html' %}
{% block title %}Письмо отправлено — ZeekrParts{% endblock %}

{% block content %}
<section class="container mx-auto px-4 py-10">
  <div class="max-w-lg mx-auto bg-white border rounded-3xl p-7 md:p-9 text-center">
    <div class="text-2xl font-bold">Проверьте почту</div>
    <p class="mt-2 text-sm text-slate-600">
      Если email существует, мы отправили ссылку для сброса пароля.
    </p>
    <div class="mt-6">
      <a class="px-5 py-3 rounded-xl bg-blue-700 text-white hover:bg-blue-800 inline-block"
         href="{% url 'shop:auth' %}">
        Вернуться ко входу
      </a>
    </div>
  </div>
</section>
{% endblock %}
