{% extends 'shop/base.html' %}
{% block title %}Восстановление пароля — ZeekrParts{% endblock %}

{% block content %}
<section class="container mx-auto px-4 py-10">
  <div class="max-w-lg mx-auto bg-white border rounded-3xl p-7 md:p-9">
    <h1 class="text-2xl font-bold">Восстановление пароля</h1>
    <p class="mt-2 text-sm text-slate-600">Введите email, на который отправим ссылку для сброса</p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.email.errors }}
      <input type="email" name="email" required
             class="w-full rounded-xl border px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-200"
             placeholder="you@email.com">
      <button class="w-full px-5 py-3 rounded-xl bg-blue-700 text-white hover:bg-blue-800 font-medium">
        Отправить ссылку
      </button>
      <div class="text-sm text-slate-600">
        <a class="hover:underline" href="{% url 'shop:auth' %}">← Назад ко входу</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
