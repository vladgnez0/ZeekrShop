{% extends 'shop/base.html' %}
{% block title %}Адрес доставки — ZeekrParts{% endblock %}
{% block content %}
<section class="container mx-auto px-4 py-10">
  <div class="max-w-xl mx-auto bg-white border rounded-3xl p-7 md:p-9">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold">Адрес доставки</h1>
        <p class="mt-1 text-sm text-slate-600">Заполните для быстрого оформления заказа</p>
      </div>
      <a href="{% url 'shop:profile' %}" class="text-sm text-blue-700 hover:underline">Назад</a>
    </div>

    <form method="post" class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
      {% csrf_token %}
      <div class="md:col-span-2">
        <label class="text-sm font-medium">Город</label>
        {{ form.city }}
      </div>
      <div class="md:col-span-2">
        <label class="text-sm font-medium">Улица</label>
        {{ form.street }}
      </div>
      <div>
        <label class="text-sm font-medium">Дом</label>
        {{ form.house }}
      </div>
      <div>
        <label class="text-sm font-medium">Квартира</label>
        {{ form.apartment }}
      </div>
      <div class="md:col-span-2">
        <label class="text-sm font-medium">Индекс</label>
        {{ form.zip_code }}
      </div>

      <div class="md:col-span-2">
        <button class="w-full px-5 py-3 rounded-xl bg-blue-700 text-white hover:bg-blue-800 font-medium">
          Сохранить
        </button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
