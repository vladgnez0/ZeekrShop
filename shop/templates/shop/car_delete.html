{% extends 'shop/base.html' %}
{% block title %}Удалить авто — ZeekrParts{% endblock %}
{% block content %}
<section class="container mx-auto px-4 py-10">
  <div class="max-w-lg mx-auto bg-white border rounded-3xl p-7 md:p-9">
    <h1 class="text-2xl font-bold">Удалить автомобиль?</h1>
    <p class="mt-2 text-sm text-slate-600">
      Вы уверены, что хотите удалить: <b>{{ car.car_model.name }}</b>?
    </p>

    <form method="post" class="mt-6 flex gap-3">
      {% csrf_token %}
      <button class="px-5 py-3 rounded-xl bg-red-600 text-white hover:bg-red-700 font-medium">
        Удалить
      </button>
      <a href="{% url 'shop:profile' %}" class="px-5 py-3 rounded-xl border hover:bg-slate-50 font-medium">
        Отмена
      </a>
    </form>
  </div>
</section>
{% endblock %}
