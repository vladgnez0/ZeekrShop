{% extends 'shop/base.html' %}
{% block title %}Редактировать профиль — ZeekrParts{% endblock %}
{% block content %}
<section class="container mx-auto px-4 py-10">
  <div class="max-w-xl mx-auto bg-white border rounded-3xl p-7 md:p-9">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold">Редактировать профиль</h1>
        <p class="mt-1 text-sm text-slate-600">Телефон и дата рождения</p>
      </div>
      <a href="{% url 'shop:profile' %}" class="text-sm text-blue-700 hover:underline">Назад</a>
    </div>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      <div>
        <label class="text-sm font-medium">Телефон</label>
        {{ form.phone }}
      </div>
      <div>
        <label class="text-sm font-medium">Дата рождения</label>
        {{ form.birth_date }}
      </div>

      <button class="w-full px-5 py-3 rounded-xl bg-blue-700 text-white hover:bg-blue-800 font-medium">
        Сохранить
      </button>
    </form>
  </div>
</section>
{% endblock %}
